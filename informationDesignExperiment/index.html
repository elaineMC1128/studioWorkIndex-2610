<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <title>Information Design Experiment</title>
    <link rel="icon" type="image/png" href="./assets/favicon.png">

    <link rel="stylesheet" href="infoDesignReset.css">
    <link rel="stylesheet" href="infoDesignStyle.css">
    <link rel="stylesheet" href="keyboardControllerStyle.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/15.3.5/Tone.js" integrity="sha512-F1myjNkIKU5XJtOs1HXRo/zOjiUsABgFEEGKLx/riwK82jRThZFebEnfF2HWo9eeC+iC1Nwwnn9Vj6OGq+r7rQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <script src="main.js" defer></script>
    <script src="keyboardController.js" defer></script>
</head>
<body>

    <dialog id="intro-dialog">
        <p>Hey this page wants to make some noise, is that OK?</p>
        <button id="dialog-close-button" autofocus>That's OK</button>
    </dialog>

    <main>

        <h1>Information Design Experiment</h1>

        <!-- !!!! -->
        <!-- These are the three range elements we will be working on for this exercise -->
        <div class="sliderContainer">
            <div class="iconContainer">
                <!--Icon on the left: indicates low volume-->
                <div class="iconBlock">
                    <span>🔈</span>
                    <small>Low</small>
                </div>

                <input type="range" id="var1Range" min="-48" max="0" step="1" value="1">
                <!--Icon on the right: indicates high volume-->
                <div class="iconBlock">
                    <span>🔊</span>
                    <small>High</small>
                </div>

            </div>
            <!--Name this slide container "Volume"  -->
            <!--associate "Volume" with the slider (clicking on the text will also select the slider)-->
            <label for="var1Range">Volume</label>
        </div>

        <div class="sliderContainer">
            <div class="iconContainer">
                <!--Because reverb can't be very vivid with icons, I added a small text below the icon to annotate it.-->
                <!--For the sake of the consistency of the web page, I set the other two slide-containers to the same effect-->
                <div class="iconBlock">
                    <!--I used control panel-style emojis here to embody the reverb. Reverb is a comprehensive sound parameter, so I use a single control panel for less reverb and multiple controllers panel for more reverb-->
                    <span>🎚️</span>
                    <small>Dry</small>
                </div>

                <input type="range" id="var2Range" min="1" max="25" step="1" value="5">

                <div class="iconBlock">
                    <span>🎛️</span>
                    <small>Space</small>
                </div>

            </div>
            <!--Name this slide container "Reverb"  -->
            <!--associate "Reverb" with the slider-->
            <label for="var2Range">Reverb</label>
        </div>


        <div class="sliderContainer">
            <div class="iconContainer">
                <!--I used simple music note emojis because pitch is often understood musically rather than numerically. The single note on the left suggests a lower or simpler tone.-->
                <div class="iconBlock">
                    <span>🎵</span>
                    <small>Heavy</small>
                </div>

                    <input type="range" id="var3Range" min="1" max="100" step="1" value="1">
                <!--The double-note emoji suggests a brighter, lighter, or more animated musical quality on the higher end of the slider.-->
                <div class="iconBlock">
                    <span>🎶</span>
                    <small>Light</small>
                </div>

            </div>
            <!--Name this slide container "Pitch"  -->
            <!--associate "Pitch" with the slider-->
            <label for="var3Range">Pitch</label>
        </div>


        <!-- !!!! -->

        <!--
        This is a template for a keyboard controller : we will look at building this style of
        input in class, but feel free to reference my code patter. I've modularised the CSS &
        JS portions into their own file, but they rely on an HTML structure like that below.
        -->
        <div class="keyboardContainer">
            <div class="octaveContainer" data-octave="3">
                <div class="whiteKeyContainer">
                    <button class="whiteKey" data-note="c"></button>
                    <button class="whiteKey" data-note="d"></button>
                    <button class="whiteKey" data-note="e"></button>
                    <button class="whiteKey" data-note="f"></button>
                    <button class="whiteKey" data-note="g"></button>
                    <button class="whiteKey" data-note="a"></button>
                    <button class="whiteKey" data-note="b"></button>
                </div>
                <div class="blackKeyContainer">
                    <div class="blackKeySpacer"></div>
                    <button class="blackKey" data-note="c#"></button>
                    <button class="blackKey" data-note="d#"></button>
                    <div class="blackKeySpacer"></div>
                    <div class="blackKeySpacer"></div>
                    <button class="blackKey" data-note="f#"></button>
                    <button class="blackKey" data-note="g#"></button>
                    <button class="blackKey" data-note="a#"></button>
                    <div class="blackKeySpacer"></div>
                </div>
            </div>

            <div class="octaveContainer" data-octave="4">
                <div class="whiteKeyContainer">
                    <button class="whiteKey" data-note="c"></button>
                    <button class="whiteKey" data-note="d"></button>
                    <button class="whiteKey" data-note="e"></button>
                    <button class="whiteKey" data-note="f"></button>
                    <button class="whiteKey" data-note="g"></button>
                    <button class="whiteKey" data-note="a"></button>
                    <button class="whiteKey" data-note="b"></button>
                </div>
                <div class="blackKeyContainer">
                    <div class="blackKeySpacer"></div>
                    <button class="blackKey" data-note="c#"></button>
                    <button class="blackKey" data-note="d#"></button>
                    <div class="blackKeySpacer"></div>
                    <div class="blackKeySpacer"></div>
                    <button class="blackKey" data-note="f#"></button>
                    <button class="blackKey" data-note="g#"></button>
                    <button class="blackKey" data-note="a#"></button>
                    <div class="blackKeySpacer"></div>
                </div>
            </div>
            
        </div>

    </main>

</body>
</html>
